name: 🤖 VKS BOT — Tự động cào tin và phân loại

on:
  # Chạy tự động 3 lần/ngày: 8h, 14h, 20h giờ Việt Nam (tương ứng 01:00, 07:00, 13:00 UTC)
  # schedule:
  #   - cron: '0 1,7,13 * * *'

  # Cho phép chạy thủ công từ tab Actions trên GitHub
  workflow_dispatch:
    inputs:
      skip_classifier:
        description: 'Bỏ qua bước phân loại AI (chỉ cào tin)'
        required: false
        default: 'false'
        type: boolean

jobs:
  crawl-and-classify:
    name: Cào tin & Phân loại AI
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Giới hạn 55 phút mỗi lần chạy

    env:
      DATABASE_URL:     ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT:     ${{ secrets.TELEGRAM_BOT }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_MODEL:     gemma-4-31b-it
      PYTHONIOENCODING: utf-8
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout code từ GitHub repo
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt Python 3.11
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Cài đặt dependencies
      - name: 📦 Cài đặt thư viện Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Tải NLTK data cần thiết
      - name: 📚 Tải NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('stopwords', quiet=True)"

      # 5. Kiểm tra kết nối Database
      - name: 🔌 Kiểm tra kết nối PostgreSQL
        run: |
          python -c "
          import os, psycopg2
          url = os.getenv('DATABASE_URL')
          if not url:
              print('❌ DATABASE_URL chưa được cấu hình trong GitHub Secrets!')
              exit(1)
          try:
              conn = psycopg2.connect(url)
              conn.close()
              print('✅ Kết nối PostgreSQL thành công!')
          except Exception as e:
              print(f'❌ Lỗi kết nối PostgreSQL: {e}')
              exit(1)
          "

      # 6. Khởi tạo cấu trúc bảng DB (nếu chưa có)
      - name: 🏗️ Khởi tạo Database Schema
        run: python -c "from crawler_db_github import init_db; init_db()"

      # 7. Chạy crawler RSS
      - name: 🕷️ Cào tin RSS
        run: python test_crawler_github.py
        continue-on-error: true

      # 8. Chạy crawler HTML trực tiếp (Non-RSS)
      - name: 🕸️ Cào tin Non-RSS (HTML trực tiếp)
        run: python non_rss_scraper_github.py
        continue-on-error: true

      # 9. Chạy phân loại AI (có thể bỏ qua khi chạy thủ công)
      - name: 🤖 Phân loại AI (Classifier)
        if: ${{ github.event.inputs.skip_classifier != 'true' }}
        run: python classifier_api_github.py
        continue-on-error: true

      # 10. Gửi báo cáo tóm tắt lên Telegram
      - name: 📊 Gửi báo cáo lên Telegram
        run: python run_pipeline_ci.py --report-only
        continue-on-error: true
