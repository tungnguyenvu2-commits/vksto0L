name: 🧪 VKS BOT — Kiểm thử Crawler Bypass

on:
  # Cho phép kích hoạt chạy thử nghiệm bất cứ lúc nào từ giao diện GitHub
  workflow_dispatch:

jobs:
  test-crawlers:
    name: Chạy Thử Nghiệm Crawler
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL:     ${{ secrets.DATABASE_URL }}
      VIETNAM_PROXY:    ${{ secrets.VIETNAM_PROXY }}
      PYTHONIOENCODING: utf-8

    steps:
      # 1. Checkout mã nguồn mới nhất
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Cài đặt dependencies
      - name: 📦 Cài đặt thư viện Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Tải dữ liệu NLTK bổ trợ cho trích xuất nội dung
      - name: 📚 Tải NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt', quiet=True)"

      # 5. Xác minh kết nối cơ sở dữ liệu
      - name: 🔌 Kiểm tra kết nối PostgreSQL
        run: |
          python -c "
          import os, psycopg2
          url = os.getenv('DATABASE_URL')
          if not url:
              print('❌ DATABASE_URL chưa được cấu hình trong GitHub Secrets!')
              exit(1)
          try:
              conn = psycopg2.connect(url)
              conn.close()
              print('✅ Kết nối PostgreSQL thành công!')
          except Exception as e:
              print(f'❌ Lỗi kết nối PostgreSQL: {e}')
              exit(1)
          "

      # 6. Chạy thử nghiệm Crawler RSS (Bypass Google Cache)
      - name: 🕷️ Chạy thử test_crawler_github.py (RSS)
        run: |
          echo "🚀 Bắt đầu quét tin tức từ RSS..."
          python test_crawler_github.py

      # 7. Chạy thử nghiệm Crawler HTML (Bypass Google Cache)
      - name: 🕸️ Chạy thử non_rss_scraper_github.py (Phi RSS)
        run: |
          echo "🚀 Bắt đầu quét tin tức phi RSS..."
          python non_rss_scraper_github.py
